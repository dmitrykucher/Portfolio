  <text x="326" y="90" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">Integration</text>
  <text x="326" y="108" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" font-weight="400" fill="#888888">Assets into build</text>

  <line x1="376" y1="96" x2="392" y2="96" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

