  <text x="444" y="108" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" font-weight="400" fill="#888888">Performance &amp; size</text>

  <rect x="158" y="160" width="100" height="48" rx="4" fill="#E8E8E8"/>
  <text x="208" y="178" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1A1A1A">3D assets</text>
  <text x="208" y="196" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" font-weight="400" fill="#888888">Modelling &amp; rigging</text>

  <line x1="258" y1="184" x2="274" y2="184" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

