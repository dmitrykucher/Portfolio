<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 280" role="img">
  <title>Magic Forest parallel build process</title>
  <desc>Two parallel tracks diverging from Design and Concept Art, converging into Final Experience</desc>
  <defs>
