      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="112" width="104" height="56" rx="4" fill="#1A1A1A"/>
  <text x="72" y="134" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Design &amp;</text>
  <text x="72" y="152" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">concept art</text>

  <line x1="124" y1="128" x2="156" y2="96" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="124" y1="152" x2="156" y2="184" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

