  <text x="586" y="134" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Final</text>
  <text x="586" y="152" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">experience</text>

  <text x="326" y="56" text-anchor="middle" font-family="'Geist', -apple-system, sans-serif" font-size="10" font-weight="500" fill="#BBBBBB" letter-spacing="0.08em">ENGINEERING</text>
  <text x="326" y="224" text-anchor="middle" font-family="'Geist', -apple-system, sans-serif" font-size="10" font-weight="500" fill="#BBBBBB" letter-spacing="0.08em">ART &amp; VFX</text>
