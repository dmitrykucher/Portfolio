  <text x="326" y="196" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" font-weight="400" fill="#888888">VFX &amp; shaders</text>

  <line x1="376" y1="184" x2="392" y2="184" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

