<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 400" role="img">
  <title>Screen mirroring user flow</title>
  <desc>Two swim lanes Phone and Spectacles showing casting flow with No loop and Yes crossing to Spectacles</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="200" fill="#FFFFFF"/>
  <rect x="0" y="200" width="680" height="200" fill="#FFFFFF"/>
  <line x1="0" y1="200" x2="680" y2="200" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="6 5"/>

  <text x="28" y="100" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="9" font-weight="600" fill="#AAAAAA" letter-spacing="0.12em" transform="rotate(-90, 28, 100)">PHONE</text>
  <text x="28" y="300" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="9" font-weight="600" fill="#AAAAAA" letter-spacing="0.12em" transform="rotate(-90, 28, 300)">SPECTACLES</text>

  <rect x="60" y="60" width="148" height="80" rx="6" fill="#EBEBEB"/>
  <text x="134" y="93" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Spectacles app</text>
  <text x="134" y="115" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#888888">Select mirroring extension</text>

  <line x1="208" y1="100" x2="232" y2="100" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="234" y="60" width="180" height="80" rx="6" fill="#EBEBEB"/>
  <text x="324" y="90" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Join Spectacles Wi-Fi?</text>
  <text x="324" y="110" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#888888">Accept broadcast permission</text>
  <text x="324" y="126" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#888888">on phone</text>

  <line x1="324" y1="140" x2="324" y2="172" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="324" y1="172" x2="134" y2="172" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="134" y1="172" x2="134" y2="140" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="229" y="188" text-anchor="middle" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#AAAAAA">No</text>

  <text x="440" y="90" text-anchor="start" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#AAAAAA">Yes</text>
  <line x1="414" y1="100" x2="480" y2="100" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="480" y1="100" x2="480" y2="236" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="440" y="238" width="116" height="80" rx="6" fill="#EBEBEB"/>
  <text x="498" y="268" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Cast Screen</text>
  <text x="498" y="288" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#888888">Phone visible</text>
  <text x="498" y="304" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" fill="#888888">in AR lens</text>

  <line x1="556" y1="278" x2="570" y2="278" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="572" y="238" width="96" height="80" rx="6" fill="#1A1A1A"/>
  <text x="620" y="262" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Control</text>
  <text x="620" y="282" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#BBBBBB">Reposition · Resize</text>
  <text x="620" y="298" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#BBBBBB">Anchor · Stop</text>
</svg>
