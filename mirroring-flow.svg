<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 340" role="img">
  <title>Screen mirroring user flow — swim lane</title>
  <desc>Two swim lanes: Phone on top, Spectacles on bottom, showing the four-step casting flow with No branch looping back</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="20" width="680" height="140" fill="#F5F5F5"/>
  <rect x="0" y="180" width="680" height="140" fill="#EFEFEF"/>
  <line x1="0" y1="178" x2="680" y2="178" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="52" y1="20" x2="52" y2="320" stroke="#E0E0E0" stroke-width="0.5"/>

  <text x="26" y="90" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="9" font-weight="600" fill="#BBBBBB" letter-spacing="0.08em" transform="rotate(-90, 26, 90)">PHONE</text>
  <text x="26" y="250" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="9" font-weight="600" fill="#BBBBBB" letter-spacing="0.08em" transform="rotate(-90, 26, 250)">SPECTACLES</text>

  <rect x="66" y="50" width="130" height="68" rx="4" fill="#E8E8E8"/>
  <text x="131" y="78" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Spectacles app</text>
  <text x="131" y="98" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">Select mirroring extension</text>

  <line x1="196" y1="84" x2="218" y2="84" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="220" y="50" width="190" height="68" rx="4" fill="#E8E8E8"/>
  <text x="315" y="74" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Join Spectacles Wi-Fi?</text>
  <text x="315" y="94" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">Accept broadcast permission</text>
  <text x="315" y="110" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">on phone</text>

  <line x1="315" y1="118" x2="315" y2="148" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="315" y1="148" x2="131" y2="148" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="131" y1="148" x2="131" y2="118" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="223" y="162" text-anchor="middle" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">No</text>

  <line x1="410" y1="84" x2="500" y2="84" stroke="#BBBBBB" stroke-width="1.5"/>
  <line x1="500" y1="84" x2="500" y2="196" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="455" y="76" text-anchor="middle" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">Yes</text>

  <rect x="450" y="198" width="100" height="68" rx="4" fill="#E8E8E8"/>
  <text x="500" y="222" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Cast Screen</text>
  <text x="500" y="242" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">Phone visible</text>
  <text x="500" y="256" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#888888">in AR lens</text>

  <line x1="550" y1="232" x2="566" y2="232" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="568" y="198" width="96" height="68" rx="4" fill="#1A1A1A"/>
  <text x="616" y="218" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">Control</text>
  <text x="616" y="236" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#BBBBBB">Reposition · Resize</text>
  <text x="616" y="252" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="10" fill="#BBBBBB">Anchor · Stop</text>
</svg>
