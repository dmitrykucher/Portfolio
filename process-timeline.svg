<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 160" role="img">
  <title>Container design process timeline</title>
  <desc>Five steps: Figma, Video, Tracking, Blender, After Effects connected by arrows</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="52" width="96" height="56" rx="4" fill="#E8E8E8"/>
  <text x="68" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Figma</text>
  <text x="68" y="96" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="400" fill="#888888">Concept</text>

  <rect x="148" y="52" width="96" height="56" rx="4" fill="#E8E8E8"/>
  <text x="196" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Video</text>
  <text x="196" y="96" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="400" fill="#888888">Acting out</text>

  <rect x="276" y="52" width="96" height="56" rx="4" fill="#E8E8E8"/>
  <text x="324" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Tracking</text>
  <text x="324" y="96" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="400" fill="#888888">Motion data</text>

  <rect x="404" y="52" width="96" height="56" rx="4" fill="#E8E8E8"/>
  <text x="452" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1A1A1A">Blender</text>
  <text x="452" y="96" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="400" fill="#888888">3D assets</text>

  <rect x="532" y="52" width="128" height="56" rx="4" fill="#1A1A1A"/>
  <text x="596" y="76" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">After Effects</text>
  <text x="596" y="96" text-anchor="middle" dominant-baseline="central" font-family="'Geist', -apple-system, sans-serif" font-size="11" font-weight="400" fill="#BBBBBB">Final composite</text>

  <line x1="116" y1="80" x2="146" y2="80" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="244" y1="80" x2="274" y2="80" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="372" y1="80" x2="402" y2="80" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="80" x2="530" y2="80" stroke="#BBBBBB" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
